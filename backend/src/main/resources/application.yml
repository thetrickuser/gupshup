spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:relay}
    username: ${DB_USER:relay}
    password: ${DB_PASS:relaypass}
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
server:
  port: ${PORT:8080}
logging:
  level:
    root: INFO
